[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Clean URL for the availability feed
[[redirects]]
  from = "/api/availability"
  to = "/.netlify/functions/availability"
  status = 200

# Clean URL for the private invoice tracker API
[[redirects]]
  from = "/api/tracker"
  to = "/.netlify/functions/tracker"
  status = 200

# Tracker is private ops tooling — never cache HTML
[[headers]]
  for = "/tracker/*"
  [headers.values]
    Cache-Control = "no-store"
    X-Robots-Tag = "noindex, nofollow"

# Service worker must revalidate so push updates ship
[[headers]]
  for = "/tracker/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/tracker/"
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/tracker/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type = "application/manifest+json"
    X-Robots-Tag = "noindex, nofollow"

# Long-cache static media (filenames are stable; rename to bust cache)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
