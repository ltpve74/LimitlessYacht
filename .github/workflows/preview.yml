name: Deploy experiment preview to GitHub Pages

on:
  push:
    branches:
      - develop
      - 'feature/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare site for project Pages subpath
        env:
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}
        run: python3 scripts/prepare-github-pages.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - id: deployment
        uses: actions/deploy-pages@v4
